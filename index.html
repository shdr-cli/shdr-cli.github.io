<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>shdr</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
:root {
  --bg-start: #0b0c16;
  --bg-mid: #1a1a30;
  --bg-end: #0e0e1b;
  --grid-line: rgba(255, 255, 255, 0.02);

  --profile-bg: rgba(10, 10, 20, 0.8);
  --profile-border: rgba(100, 120, 160, 0.3);
  --profile-shadow: rgba(50, 70, 120, 0.2);
  --profile-shadow-dark: rgba(0, 0, 0, 0.3);

  --avatar-border: rgba(20, 20, 40, 0.6);
  --avatar-glow: rgba(50, 70, 120, 0.3);
  --avatar-shadow: rgba(0, 0, 0, 0.15);

  --name-color: #c0c8e0;
  --name-glow: rgb(50, 70, 120);

  --link-bg: rgba(20, 20, 40, 0.6);
  --link-border: rgba(100, 120, 160, 0.15);
  --link-shadow: rgba(0, 0, 0, 0.05);

  --link-hover-bg: rgba(50, 70, 120, 0.1);
  --link-hover-border: #6078a0;

  --link-color: #c0c8e0;
  --link-hover-color: #ffffff;

  --icon-color: #a0b0c8;
  --icon-hover-color: #c0d0f0;
}

@keyframes borderGlow {
  0% { border-color: rgba(100, 120, 160, 0.2); box-shadow: 0 0 10px rgba(50, 70, 120, 0.2); }
  50% { border-color: rgba(100, 120, 160, 0.6); box-shadow: 0 0 25px rgba(50, 70, 120, 0.4); }
  100% { border-color: rgba(100, 120, 160, 0.2); box-shadow: 0 0 10px rgba(50, 70, 120, 0.2); }
}

@keyframes neonPulse {
  0% { background-position: 0% 0%; opacity: 0.9; }
  50% { background-position: 100% 100%; opacity: 1; }
  100% { background-position: 0% 0%; opacity: 0.9; }
}

@keyframes gridMove {
  0% { background-position: 0 0, 0 0; }
  100% { background-position: 30px 30px, 30px 30px; }
}

@keyframes gridMove2 {
  0% { background-position: 0 0, 0 0; }
  100% { background-position: 20px 20px, 20px 20px; }
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-5px); }
  100% { transform: translateY(0px); }
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter';
  background: radial-gradient(circle at 20% 20%, var(--bg-start), var(--bg-mid), var(--bg-end));
  background-size: 200%;
  animation: neonPulse 6s ease infinite;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
  color: var(--name-color);
  line-height: 1.5;
  overflow: hidden;
}

body::before {
  content: "";
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background:
    linear-gradient(var(--grid-line) 2px, transparent 2px),
    linear-gradient(90deg, var(--grid-line) 2px, transparent 2px);
  background-size: 30px 30px;
  animation: gridMove 4s linear infinite;
  z-index: 0;
}

.profile {
  position: relative;
  z-index: 2;
  max-width: 520px;
  width: 100%;
  background: var(--profile-bg);
  backdrop-filter: blur(20px);
  border-radius: 32px;
  padding: 2.4rem 2rem 2rem;
  border: 2px solid var(--profile-border);
  box-shadow:
    0 0 20px var(--profile-shadow),
    0 8px 32px var(--profile-shadow-dark);
  animation:
    borderGlow 4s ease-in-out infinite,
    float 3s ease-in-out infinite;
}

.avatar-wrapper {
  display: flex;
  justify-content: center;
  margin-bottom: 1.4rem;
}

.avatar {
  width: 220px;
  height: 220px;
  border-radius: 100%;
  border: 4px solid var(--avatar-border);
  filter: brightness(120%);
  box-shadow:
    0 0 20px var(--avatar-glow),
    0 6px 14px var(--avatar-shadow);
  transition: all 0.4s cubic-bezier(0.2, 0.8, 0.32, 1.22);
}

.avatar:hover {
  transform: scale(1.05) rotate(6deg);
  border-color: var(--link-hover-border);
}

.name {
  font-size: 3.8rem;
  font-weight: bolder;
  letter-spacing: -0.02em;
  text-align: center;
  color: var(--name-color);
  line-height: 1.2;
  margin-bottom: 1.8rem;
  display: flex;
  justify-content:center;
  text-shadow:
    0 0 10px var(--name-glow),
    0 0 10px var(--name-glow);
}

.links {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
}

.link-btn {
  display: flex;
  align-items:center;
  gap:10px;
  padding:0.9rem 1.8rem;
  background: var(--link-bg);
  backdrop-filter: blur(14px);
  border-radius: 60px;
  text-decoration:none;
  color: var(--link-color);
  font-weight: 500;
  font-size: 1.1rem;
  border: 1.5px solid var(--link-border);
  box-shadow: 0 4px 15px var(--link-shadow);
  transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
}

.link-btn:hover {
  background: var(--link-hover-bg);
  border-color: var(--link-hover-border);
  transform: scale(1.06) translateY(-2px);
  box-shadow:
    0 0 25px var(--link-hover-shadow),
    0 10px 20px var(--link-hover-shadow-dark);
  color: var(--link-hover-color);
}

.link-btn span {
  opacity: 0.5;
}

.link-btn:hover span {
  opacity: 1;
  text-shadow:
    0 0 10px var(--name-glow),
    0 0 10px var(--name-glow);
}

.link-btn i {
  opacity: 0.5;
  font-size: 1.2rem;
  transition: all 0.2s;
  color: var(--icon-color);
}

.link-btn:hover i {
  opacity: 1;
  color: var(--icon-hover-color);
  transform: scale(1.1);
}

.link-btn .arrow {
  opacity: 0.5;
  font-size: 0.9rem;
  transition: all 0.2s; 
}

.link-btn:hover .arrow {
  opacity: 1;
  transform: translateX(3px);
}

@media(max-width: 800px) {
  body::before { background-size: 20px 20px; animation: gridMove2 4s linear infinite; }
  .profile { padding: 1.8rem 1.2rem; border-radius: 28px; }
  .avatar { width: 180px; height: 180px; }
  .name { font-size: 3.6rem; }
  .link-btn { padding: 0.75rem 1.4rem; font-size: 1rem; }
}

@media(max-width: 550px) {
  .profile { padding: 1.8rem 1.2rem; border-radius: 28px; }
  .avatar { width: 180px; height: 180px; }
  .name { font-size: 3.2rem; }
  .link-btn { padding: 0.75rem 1.4rem; font-size: 0.9rem; }
}

</style>
</head>

<body>
  <div class="profile">
    <div class="avatar-wrapper">
      <img class="avatar" src="https://avatars.githubusercontent.com/u/142397443?v=4" alt="shdr">
    </div>

    <h1 class="name">shdr</h1>

    <div class="links">
      <a href="https://github.com/shdr-cli" class="link-btn" target="_blank" rel="noopener">
        <i class="fa-brands fa-github"></i>
        <span>@shdr-cli</span>
        <i class="fa-solid fa-arrow-right arrow"></i>
      </a>
    </div>
  </div>
</body>

</html>
